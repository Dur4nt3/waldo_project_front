<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512"><defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a3a"></stop>
      <stop offset="100%" stop-color="#0d1820"></stop>
    </radialGradient>
    <radialGradient id="spotlightGrad" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.18"></stop>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <clipPath id="roundRect">
      <rect width="512" height="512" rx="96" ry="96"></rect>
    </clipPath>
